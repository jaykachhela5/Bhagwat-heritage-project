<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery Admin</title>
<link rel="stylesheet" href="gallery.css">
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>BHSFT</h2>
    <ul>
      <li class="active">Gallery</li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="header">
      <h2>Gallery Upload</h2>
      <button onclick="fileInput.click()" class="uploadBtn">
        + Upload Media
      </button>
    </div>

    <!-- Upload Box -->
    <div class="uploadBox">
      <input type="file" id="fileInput" hidden>
      <p>Drag & Drop Images</p>
    </div>

    <!-- Gallery -->
    <div id="gallery" class="gallery"></div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
