<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHSFT Gallery Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#f4f6f9;
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h2{
  color:#065f46;
}

.logout{
  background:red;
  color:white;
  border:none;
  padding:10px 15px;
  cursor:pointer;
}

.upload-box{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:6px;
}

.delete{
  background:red;
  color:white;
  border:none;
  padding:6px 10px;
  margin-top:5px;
  cursor:pointer;
}

.controls{
  margin-top:20px;
  text-align:center;
}

button{
  padding:8px 15px;
  margin:5px;
  cursor:pointer;
}

progress{
  width:100%;
  height:20px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Gallery Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="upload-box">
  <input type="file" id="files" multiple>
  <button onclick="upload()">Upload Images</button>
  <br><br>
  <progress id="progress" value="0" max="100"></progress>
</div>

<input id="search" placeholder="Search images..." onkeyup="load()" style="padding:10px;width:100%;margin-bottom:20px;">

<div id="gallery" class="gallery"></div>

<div class="controls">
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
