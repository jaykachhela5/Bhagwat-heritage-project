<!DOCTYPE html>
<html>
<head>
<title>Volunteer Form</title>
<link rel="stylesheet" href="form.css">
</head>

<body>

<div class="form-box">
<h2>Volunteer Registration</h2>

<form id="volForm">
<input type="text" placeholder="Name" id="name" required>
<input type="email" placeholder="Email" id="email" required>
<input type="text" placeholder="Phone" id="phone" required>
<input type="text" placeholder="Skills" id="skills">
<textarea placeholder="Message" id="message"></textarea>

<button type="submit">Join</button>
</form>

<p id="msg"></p>

</div>

<script>document.getElementById("volForm").addEventListener("submit", async(e)=>{

  e.preventDefault();

  const data = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    skills: skills.value,
    message: message.value
  };

  const res = await fetch("http://localhost:5000/api/volunteer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  const result = await res.json();
  document.getElementById("msg").innerText = result.message;
});
</script>
</body>
</html>
