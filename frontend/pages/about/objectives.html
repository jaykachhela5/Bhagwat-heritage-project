<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHSFT Objectives</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>भगवत हेरिटेज सेवा ट्रस्ट</h1>
        <p>सेवा • संस्कार • संस्कृति</p>
        <button>सेवा से जुड़ें</button>
    </div>
</section>
<!-- MAIN OBJECTIVE -->
<section class="objective">
    <h1>हमारे उद्देश्य</h1>
    <p>
        हम श्रीमद्भागवत के आध्यात्मिक, सामाजिक और सांस्कृतिक संदेश को
        जन-जन तक पहुँचाने के लिए समर्पित हैं।
    </p>
</section>

<!-- MAIN CARDS -->
<section class="main-cards">

    <div class="card">
        <img src="/frontend/images/sanskriti (3).png">
        <h3>भक्ति</h3>
        <p>श्रीहरि भक्ति का जागरण</p>
        <button>और जानें</button>
    </div>

    <div class="card">
        <img src="/frontend/images/sa2.png">
        <h3>सेवा</h3>
        <p>मानव सेवा का विस्तार</p>
        <button>और जानें</button>
    </div>

    <div class="card">
        <img src="/frontend/images/sa1.png">
        <h3>संस्कृति</h3>
        <p>सनातन संस्कृति का संरक्षण</p>
        <button>और जानें</button>
    </div>

</section>

<!-- OTHER OBJECTIVES -->
<section class="other">
    <h2>अन्य उद्देश्य</h2>
    <div class="grid" id="data"></div>
</section>

<script src="script.js"></script>
</body>
</html>
